<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
         body {
            font-family: sans-serif;
            background-color: #0d1b32;
            color: #ffffff;
            text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.7);
            padding: 0px;
            margin: 0px;
            line-height: 1.6;
        }

        #main{
            padding: 10px;
            gap: 10px;
            margin: 100px;
            align-self: center;
            align-items: center;
            margin: 1px;
            box-shadow: 2px 3px 3px rgba(0, 0, 0, 0.7);
        }

        button{
            padding: 10px 20px;
            font-weight: bold;
            margin: none;
        }

        input{
            padding: 10px 20px;
            font-weight: bold;
            box-shadow: 2px 3px 3px rgba(0, 0, 0, 0.7);
            background-color: #ffffff;
        }

        #buttonDiv{
            align-items: center;
        }
    <title>Student Login - Solar System Quiz</title>
</head>
<body>
    <div id="main">
        <h2>Please login with your name and sr. no.:</h2>
        <p>Enter your name:</p>
        <input id="InputedName">
        <p>Enter your Sr. No.</p>
        <input id="InputedSrno">
        <div id="buttonDiv">
            <button id="loginButton">Login</button>
        </div>
    </div>
    <div class="login-container">
        <h2>Student Login</h2>
        <input type="number" id="rollNumber" placeholder="Enter your SR Number" required>
        <input type="text" id="studentName" placeholder="Enter your Name" required>
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <script>
        function startQuiz() {
            const rollNumber = document.getElementById("rollNumber").value;
            const studentName = document.getElementById("studentName").value;

            if (rollNumber && studentName) {
                localStorage.setItem("rollNumber", rollNumber);
                localStorage.setItem("studentName", studentName);
                window.location.href = "quiz.html"; // Redirect to the quiz page
            } else {
                alert("Please enter both your SR Number and Name.");
            }
        }
    </script>
</body>
</html>
